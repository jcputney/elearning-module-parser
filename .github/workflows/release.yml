---
name: Release

permissions:
  contents: write
  packages: write
  statuses: write
  checks: write

on:
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.MAVEN_RELEASE_SSH_KEY }}
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"
          server-id: central
          server-username: OSSRH_USERNAME
          server-password: OSSRH_TOKEN
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Publish package to Maven Central
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mvn -B -ntp -Dstyle.color=always release:prepare
          cat release.properties
          TAG=$(grep 'scm.tag=' release.properties | cut -d'=' -f2)
          VERSION=${TAG#v}
          mvn -B -ntp -Dstyle.color=always release:perform -DconnectionUrl=scm:git:https://github.com/${{ github.repository }}.git
          echo "Released ${TAG} 🚀" >> $GITHUB_STEP_SUMMARY
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Attest build provenance for release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            target/checkout/target/elearning-module-parser-*.jar

      - name: Attest SBOM for release artifacts
        uses: actions/attest-sbom@v2
        with:
          subject-path: |
            target/checkout/target/elearning-module-parser-*.jar
            !target/checkout/target/elearning-module-parser-*-sources.jar
            !target/checkout/target/elearning-module-parser-*-javadoc.jar
          sbom-path: target/checkout/target/elearning-module-parser-*-cyclonedx.json

      - name: Upload SBOM to GitHub Release
        # Maven Central publish above is irreversible; do not fail the job if a
        # transient gh API error or a rerun on an existing release prevents
        # this step from completing. The step is still idempotent: on a rerun
        # we upload to the existing release with --clobber, so a successful
        # retry replaces any prior assets cleanly.
        continue-on-error: true
        run: |
          TAG=$(grep 'scm.tag=' release.properties | cut -d'=' -f2)
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" \
              target/checkout/target/elearning-module-parser-*-cyclonedx.json \
              target/checkout/target/elearning-module-parser-*-cyclonedx.xml \
              --clobber
          else
            gh release create "${TAG}" \
              target/checkout/target/elearning-module-parser-*-cyclonedx.json \
              target/checkout/target/elearning-module-parser-*-cyclonedx.xml \
              --title "${TAG}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update documentation with released version
        run: |
          TAG=$(grep 'scm.tag=' release.properties | cut -d'=' -f2)
          VERSION=${TAG#v}

          # Update Maven dependency version (only the line after the library artifactId)
          sed -i '/<artifactId>elearning-module-parser<\/artifactId>/{n;s/<version>.*<\/version>/<version>'"${VERSION}"'<\/version>/}' README.md

          # Update Gradle dependency version
          sed -i "s/dev\.jcputney:elearning-module-parser:.*\")/dev.jcputney:elearning-module-parser:${VERSION}\")/" README.md

          # Update example version in bug report template
          sed -i "s/Library version: (e.g., .*)/Library version: (e.g., ${VERSION})/" .github/ISSUE_TEMPLATE/bug_report.md

          git add README.md .github/ISSUE_TEMPLATE/bug_report.md
          git commit -m "docs: update version references to ${VERSION}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
